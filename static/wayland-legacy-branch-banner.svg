  </text>
  <rect x="42" y="112" width="232" height="38" rx="19" fill="url(#waylandPill)"/>
  <text x="158" y="136" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#2f1500" text-anchor="middle">
    Check Legacy Wayland Branch
  </text>
  <text x="42" y="176" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#9e8c91">
    branch: wayland-hyprland-waybar-rofi-eww
  </text>
</svg>
