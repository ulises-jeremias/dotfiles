<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="waylandTitle waylandDesc">
  <title id="waylandTitle">Wayland legacy branch banner</title>
  <desc id="waylandDesc">Banner linking to the legacy Wayland branch with Hyprland, Waybar, Rofi, and EWW.</desc>
  <defs>
    <linearGradient id="waylandBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171114"/>
      <stop offset="52%" stop-color="#241b1e"/>
      <stop offset="100%" stop-color="#332319"/>
    </linearGradient>
    <radialGradient id="waylandBloom" cx="74%" cy="30%" r="64%">
      <stop offset="0%" stop-color="#f0bc95" stop-opacity="0.36"/>
      <stop offset="58%" stop-color="#ffb0ca" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffb0ca" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waylandPill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffdcc3"/>
      <stop offset="100%" stop-color="#f0bc95"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="18" fill="url(#waylandBg)"/>
  <rect width="800" height="200" rx="18" fill="url(#waylandBloom)"/>
  <rect x="1" y="1" width="798" height="198" rx="17" fill="none" stroke="#514347" stroke-width="1.4"/>
  <circle cx="648" cy="48" r="74" fill="#f0bc95" fill-opacity="0.09"/>
  <circle cx="720" cy="146" r="96" fill="#ffb0ca" fill-opacity="0.10"/>
  <g opacity="0.92">
    <rect x="548" y="42" width="170" height="104" rx="16" fill="#261d20" stroke="#705b62" stroke-opacity="0.7"/>
    <rect x="570" y="62" width="126" height="14" rx="7" fill="#f0bc95" fill-opacity="0.88"/>
    <rect x="570" y="92" width="104" height="8" rx="4" fill="#d5c2c6" fill-opacity="0.32"/>
    <rect x="570" y="114" width="76" height="8" rx="4" fill="#d5c2c6" fill-opacity="0.22"/>
    <circle cx="692" cy="118" r="16" fill="#ffb0ca" fill-opacity="0.16"/>
    <path d="M684 118h16M692 110v16" stroke="#ffb0ca" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="42" y="56" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="750" fill="#efdfe2">
    Looking for the classic Wayland stack?
  </text>
  <text x="42" y="86" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#d5c2c6">
