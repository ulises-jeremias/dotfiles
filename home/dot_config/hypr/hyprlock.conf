# Hyprlock configuration
# Smart Colors integration: colors are overridden by the sourced file below.
# Run `dots-hyprlock-theme` to regenerate colors from the current palette.
# Reference: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

# ── Fallback static colors (used when smart-colors file not yet generated) ─────

background {
  monitor =
  color = rgba(191114ff)
  blur_passes = 3
  blur_size = 6
}

input-field {
  monitor =
  size = 300, 60
  outline_thickness = 2
  dots_spacing = 0.35
  dots_center = true
  fade_on_empty = true
  placeholder_text =   Enter Password
  font_family = Rubik
  font_size = 13
  inner_color = rgba(191114bb)
  outer_color = rgba(9e8c9188)
  check_color = rgb(ffb0ca)
  fail_color = rgba(ffb4abbb)
  rounding = 12
  shadow_passes = 3
  shadow_size = 8
  shadow_color = rgba(00000060)
}

label {
  monitor =
  text = $TIME12
  color = rgba(efdfe2ff)
  font_size = 56
  font_family = Rubik 300
  position = 0, 160
  halign = center
  valign = center
  shadow_passes = 3
  shadow_size = 6
  shadow_color = rgba(00000088)
}

label {
  monitor =
  text = $DATE
  color = rgba(d5c2c6cc)
  font_size = 14
  font_family = Rubik
  position = 0, 80
  halign = center
  valign = center
}

label {
  monitor =
  text =  $USER
  color = rgba(e2bdc7ff)
  font_size = 13
  font_family = Rubik
  position = 0, -80
  halign = center
  valign = center
}

# ── Smart Colors override (generated by dots-hyprlock-theme) ──────────────────
# This file is auto-generated and overrides the fallback colors above.
# Updated whenever the color scheme changes via dots-color-scheme.
source = ~/.cache/dots/smart-colors/colors-hyprlock.conf
