# ============================================================================
# Nature Animations Configuration
# ============================================================================
#
# Gentle, organic animations for nature/forest aesthetics
# Smooth beziers, calm transitions, earthy feel — like leaves in the wind
# ============================================================================

animations {
    enabled = true

    # ============================================================================
    # Nature Bezier Curves
    # ============================================================================
    # Smooth, organic curves that feel natural and unhurried

    bezier = leaf,    0.25, 0.46, 0.45, 0.94
    bezier = breeze,  0.16, 1.00, 0.30, 1.00
    bezier = root,    0.22, 1.00, 0.36, 1.00
    bezier = branch,  0.34, 1.56, 0.64, 1.00
    bezier = settle,  0.08, 0.82, 0.30, 1.00

    # Window animations - Smooth and natural (7 frames / ~116ms)
    animation = windows,     1, 7,  branch, popin 80%
    animation = windowsIn,   1, 6,  breeze, popin 85%
    animation = windowsOut,  1, 5,  settle, popin 75%
    animation = windowsMove, 1, 8,  leaf,   slide

    # Border animations - Gentle pulse
    animation = border,      1, 10, settle

    # Fade animations - Soft and gradual (5 frames / ~83ms)
    animation = fade,        1, 5,  settle
    animation = fadeIn,      1, 4,  breeze
    animation = fadeOut,     1, 4,  leaf
    animation = fadeSwitch,  1, 5,  root
    animation = fadeShadow,  1, 6,  settle
    animation = fadeDim,     1, 5,  leaf

    # Workspace animations - Gentle drift (8 frames)
    animation = workspaces,       1, 8,  breeze,  slide
    animation = specialWorkspace, 1, 7,  root,    slidevert

    # Layer animations - Soft fade (5 frames)
    animation = layers,    1, 5, breeze, fade
    animation = layersIn,  1, 4, breeze, fade
    animation = layersOut, 1, 4, settle, fade
}
